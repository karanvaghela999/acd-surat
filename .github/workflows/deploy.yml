name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::047249942995:role/github-actions-acd26-deploy
          aws-region: ap-south-1

      - name: Sync to S3
        run: aws s3 sync ./out s3://acd26.awsugsurat.com --delete --region ap-south-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2AWA32IPHA0UU \
            --paths "/*"
