name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::047249942995:role/github-actions-acd26-deploy
          aws-region: ap-south-1

      - name: Sync to S3
        run: aws s3 sync ./out s3://acd26.awsugsurat.com --delete --region ap-south-1

      - name: Apply security headers policy
        run: |
          python3 << 'PYEOF'
          import subprocess, json, sys

          POLICY_NAME  = "acd26-security-headers"
          DIST_ID      = "E2AWA32IPHA0UU"

          with open("cloudfront/security-headers-policy.json") as f:
              policy_cfg = json.load(f)

          # Check whether the named policy already exists
          r = subprocess.run(
              ["aws", "cloudfront", "list-response-headers-policies",
               "--type", "custom", "--region", "us-east-1", "--output", "json"],
              capture_output=True, text=True, check=True
          )
          items = json.loads(r.stdout).get("ResponseHeadersPolicyList", {}).get("Items", [])
          existing = next(
              (p for p in items
               if p["ResponseHeadersPolicy"]["ResponseHeadersPolicyConfig"]["Name"] == POLICY_NAME),
              None
          )

          if existing:
              policy_id = existing["ResponseHeadersPolicy"]["Id"]
              r = subprocess.run(
                  ["aws", "cloudfront", "get-response-headers-policy",
                   "--id", policy_id, "--region", "us-east-1", "--output", "json"],
                  capture_output=True, text=True, check=True
              )
              etag = json.loads(r.stdout)["ETag"]
              subprocess.run(
                  ["aws", "cloudfront", "update-response-headers-policy",
                   "--id", policy_id,
                   "--response-headers-policy-config", json.dumps(policy_cfg),
                   "--if-match", etag, "--region", "us-east-1"],
                  check=True
              )
              print(f"Updated response headers policy {policy_id}")
          else:
              policy_cfg["CallerReference"] = "acd26-security-headers-v1"
              r = subprocess.run(
                  ["aws", "cloudfront", "create-response-headers-policy",
                   "--response-headers-policy-config", json.dumps(policy_cfg),
                   "--region", "us-east-1", "--output", "json"],
                  capture_output=True, text=True, check=True
              )
              policy_id = json.loads(r.stdout)["ResponseHeadersPolicy"]["Id"]
              print(f"Created response headers policy {policy_id}")

          # Attach to distribution if not already set
          r = subprocess.run(
              ["aws", "cloudfront", "get-distribution-config",
               "--id", DIST_ID, "--output", "json"],
              capture_output=True, text=True, check=True
          )
          data   = json.loads(r.stdout)
          etag   = data["ETag"]
          config = data["DistributionConfig"]

          if config["DefaultCacheBehavior"].get("ResponseHeadersPolicyId") != policy_id:
              config["DefaultCacheBehavior"]["ResponseHeadersPolicyId"] = policy_id
              subprocess.run(
                  ["aws", "cloudfront", "update-distribution",
                   "--id", DIST_ID,
                   "--distribution-config", json.dumps(config),
                   "--if-match", etag],
                  check=True
              )
              print("Distribution updated — security headers policy attached")
          else:
              print("Distribution already uses this policy — no update needed")
          PYEOF

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2AWA32IPHA0UU \
            --paths "/*"
